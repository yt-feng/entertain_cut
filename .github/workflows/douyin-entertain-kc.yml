name: Douyin Entertainment KC

on:
  workflow_dispatch:
    inputs:
      keyword:
        description: "Douyin search keyword"
        required: true
        default: "娱乐"
      limit:
        description: "How many top videos to package"
        required: true
        default: "5"
      max_search_pages:
        description: "TikHub pages to request; each page is one charged call"
        required: true
        default: "1"
      search_api_version:
        description: "TikHub search endpoint: v2, v1, or general_v2"
        required: true
        default: "v2"
        type: choice
        options:
          - v2
          - v1
          - general_v2
      publish_time:
        description: "TikHub publish_time; 1 means last day"
        required: true
        default: "1"
      base_url:
        description: "TikHub base URL"
        required: true
        default: "https://api.tikhub.io"
      search_only:
        description: "Only fetch links, skip download and KC packaging"
        required: true
        type: boolean
        default: false
      force_fallback:
        description: "Skip DeepSeek and use local fallback KC captions"
        required: true
        type: boolean
        default: false

jobs:
  douyin-entertain-kc:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
      TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
      TIKHUB_BASE_URL: ${{ inputs.base_url }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      WHISPER_MODEL: ${{ github.workspace }}/models/ggml-small.bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Cache Whisper model
        if: ${{ inputs.search_only == false }}
        uses: actions/cache@v4
        with:
          path: models/ggml-small.bin
          key: whisper-cpp-ggml-small

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ffmpeg tesseract-ocr tesseract-ocr-chi-sim \
            fonts-noto-cjk fonts-dejavu-core ca-certificates curl git

      - name: Install Python packages
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow yt-dlp

      - name: Build whisper.cpp
        if: ${{ inputs.search_only == false }}
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp /tmp/whisper.cpp
          cmake -S /tmp/whisper.cpp -B /tmp/whisper.cpp/build \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build /tmp/whisper.cpp/build --config Release -j2
          echo "/tmp/whisper.cpp/build/bin" >> "$GITHUB_PATH"

      - name: Download Whisper model
        if: ${{ inputs.search_only == false }}
        run: |
          mkdir -p models
          if [[ ! -s "$WHISPER_MODEL" ]]; then
            curl -L --retry 3 -o "$WHISPER_MODEL" \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
          fi

      - name: Fetch links only
        if: ${{ inputs.search_only == true }}
        run: |
          python tools/run_douyin_entertain_kc.py \
            --keyword "${{ inputs.keyword }}" \
            --limit "${{ inputs.limit }}" \
            --max-search-pages "${{ inputs.max_search_pages }}" \
            --search-api-version "${{ inputs.search_api_version }}" \
            --publish-time "${{ inputs.publish_time }}"

      - name: Fetch, download, and package KC videos
        if: ${{ inputs.search_only == false }}
        run: |
          extra_args=()
          if [[ "${{ inputs.force_fallback }}" == "true" || -z "${DEEPSEEK_API_KEY}" ]]; then
            extra_args+=(--force-fallback)
          fi
          python tools/run_douyin_entertain_kc.py \
            --keyword "${{ inputs.keyword }}" \
            --limit "${{ inputs.limit }}" \
            --max-search-pages "${{ inputs.max_search_pages }}" \
            --search-api-version "${{ inputs.search_api_version }}" \
            --publish-time "${{ inputs.publish_time }}" \
            --download \
            --kc \
            --download-dir new_video_pending \
            --kc-output-dir outputs/kc_entertain \
            --kc-work-dir work/auto_kc \
            --encoder libx264 \
            --threads 2 \
            "${extra_args[@]}"

      - name: Upload run reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: douyin-entertain-run
          path: |
            media_hub/runs/douyin_entertain_*
            work/douyin_entertain/runs/douyin_entertain_*
            work/auto_kc/last_run_summary.md
            work/auto_kc/last_run_outputs.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload downloaded source videos
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: douyin-source-videos
          path: new_video_pending/*
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload KC videos
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kc-entertain-videos
          path: outputs/kc_entertain/*.mp4
          if-no-files-found: ignore
          retention-days: 14
