name: Douyin Free Selected KC Daily

on:
  workflow_dispatch:
    inputs:
      limit:
        description: "How many high-quality entertainment star clips to package"
        required: true
        default: "5"
      search_only:
        description: "Only discover and upload douyin-free-selected-videos, skip KC packaging"
        required: true
        type: boolean
        default: false
      force_fallback:
        description: "Skip DeepSeek and use local fallback KC captions"
        required: true
        type: boolean
        default: false
      selected_artifact_run_id:
        description: "Optional prior run id containing douyin-free-selected-videos; used for KC render test"
        required: false
        default: ""
      kc_artifact_run_id:
        description: "Optional prior run id containing kc-entertain-videos; used to publish existing KC outputs to main"
        required: false
        default: ""
  schedule:
    # 07:00 Beijing time every day.
    - cron: "0 23 * * *"

permissions:
  contents: write

jobs:
  douyin-free-kc-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 240

    env:
      PYTHONUNBUFFERED: "1"
      TIKHUB_API_KEY: ${{ secrets.TIKHUB_API_KEY }}
      DOUYIN_COOKIE: ${{ secrets.DOUYIN_COOKIE }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      BING_SEARCH_API_KEY: ${{ secrets.BING_SEARCH_API_KEY }}
      BING_SEARCH_ENDPOINT: ${{ secrets.BING_SEARCH_ENDPOINT }}
      HOTSPOT_ASSISTANT_API_URL: ${{ secrets.HOTSPOT_ASSISTANT_API_URL }}
      HOTSPOT_ASSISTANT_API_KEY: ${{ secrets.HOTSPOT_ASSISTANT_API_KEY }}
      JIANGUOYUN_WEBDAV_USER: ${{ secrets.JIANGUOYUN_WEBDAV_USER }}
      JIANGUOYUN_WEBDAV_PASSWORD: ${{ secrets.JIANGUOYUN_WEBDAV_PASSWORD }}
      KC_GIT_MAX_BYTES: "103809024"
      WHISPER_MODEL: ${{ github.workspace }}/models/ggml-small.bin

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set Beijing output folder
        run: |
          output_date="$(TZ=Asia/Shanghai date +%F)"
          echo "KC_OUTPUT_DATE=${output_date}" >> "$GITHUB_ENV"
          echo "KC_OUTPUT_DIR=outputs/kc_entertain/${output_date}" >> "$GITHUB_ENV"
          echo "KC output folder: outputs/kc_entertain/${output_date}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install system packages
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.kc_artifact_run_id == '' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake ffmpeg git ca-certificates curl \
            tesseract-ocr tesseract-ocr-chi-sim fonts-noto-cjk fonts-dejavu-core

      - name: Install Python packages
        if: ${{ github.event_name != 'workflow_dispatch' || github.event.inputs.kc_artifact_run_id == '' }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install pillow httpx yt-dlp

      - name: Cache Whisper model
        if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.search_only != 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.kc_artifact_run_id == '') }}
        uses: actions/cache@v4
        with:
          path: models/ggml-small.bin
          key: whisper-cpp-ggml-small

      - name: Build whisper.cpp
        if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.search_only != 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.kc_artifact_run_id == '') }}
        run: |
          git clone --depth 1 https://github.com/ggerganov/whisper.cpp /tmp/whisper.cpp
          cmake -S /tmp/whisper.cpp -B /tmp/whisper.cpp/build \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build /tmp/whisper.cpp/build --config Release -j2
          echo "/tmp/whisper.cpp/build/bin" >> "$GITHUB_PATH"

      - name: Download Whisper model
        if: ${{ (github.event_name != 'workflow_dispatch' || github.event.inputs.search_only != 'true') && (github.event_name != 'workflow_dispatch' || github.event.inputs.kc_artifact_run_id == '') }}
        run: |
          mkdir -p models
          if [[ ! -s "$WHISPER_MODEL" ]]; then
            curl -L --retry 3 -o "$WHISPER_MODEL" \
              https://huggingface.co/ggerganov/whisper.cpp/resolve/main/ggml-small.bin
          fi

      - name: Discover selected videos and package KC
        if: ${{ github.event_name != 'workflow_dispatch' || (github.event.inputs.selected_artifact_run_id == '' && github.event.inputs.kc_artifact_run_id == '') }}
        run: |
          extra_args=()
          if [[ "${{ github.event.inputs.search_only }}" == "true" ]]; then
            extra_args+=(--search-only)
          fi
          if [[ "${{ github.event.inputs.force_fallback }}" == "true" || -z "${DEEPSEEK_API_KEY}" ]]; then
            extra_args+=(--force-fallback)
          fi

          python tools/run_douyin_free_kc_daily.py \
            --provider tikhub \
            --limit "${{ inputs.limit || '5' }}" \
            --recent-hours 720 \
            --primary-min-likes 10000 \
            --fallback-min-likes 1000 \
            --target-min-duration-seconds 60 \
            --max-duration-seconds 300 \
            --search-max 50 \
            --download-candidate-multiplier 8 \
            --min-selected-videos 5 \
            --tikhub-max-search-requests 5 \
            --tikhub-filter-duration auto \
            --processed-manifest outputs/kc_entertain/processed_aweme_ids.json \
            --output-date "$KC_OUTPUT_DATE" \
            --direct-download-timeout-seconds 45 \
            --direct-download-max-urls 1 \
            --yt-dlp-timeout-seconds 60 \
            --downloader-link-timeout-seconds 60 \
            --work-root work/douyin_free_daily \
            --kc-work-dir work/auto_kc_douyin_free \
            --output-dir "$KC_OUTPUT_DIR" \
            --encoder libx264 \
            --threads 2 \
            "${extra_args[@]}"

      - name: Download selected videos from prior free run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selected_artifact_run_id != '' && github.event.inputs.kc_artifact_run_id == '' }}
        uses: actions/download-artifact@v5
        with:
          name: douyin-free-selected-videos
          run-id: ${{ github.event.inputs.selected_artifact_run_id }}
          github-token: ${{ github.token }}
          path: work/douyin_free_daily/latest/selected

      - name: Download reports from prior free run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selected_artifact_run_id != '' && github.event.inputs.kc_artifact_run_id == '' }}
        uses: actions/download-artifact@v5
        with:
          name: douyin-free-daily-reports
          run-id: ${{ github.event.inputs.selected_artifact_run_id }}
          github-token: ${{ github.token }}
          path: work/douyin_free_daily/latest/reports

      - name: Prepare limited prior selected videos
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selected_artifact_run_id != '' && github.event.inputs.kc_artifact_run_id == '' }}
        env:
          KC_LIMIT: ${{ inputs.limit || '5' }}
        run: |
          python - <<'PY'
          import os
          import shutil
          from pathlib import Path

          try:
              limit = int(os.environ.get("KC_LIMIT", "10"))
          except ValueError:
              limit = 10
          limit = max(1, limit)

          source = Path("work/douyin_free_daily/latest/selected")
          target = Path("work/douyin_free_daily/latest/selected_limited")
          target.mkdir(parents=True, exist_ok=True)
          suffixes = {".mp4", ".mov", ".m4v", ".webm"}
          files = sorted(
              (path for path in source.iterdir() if path.is_file() and path.suffix.lower() in suffixes),
              key=lambda path: (path.stat().st_size, path.name),
          )
          if not files:
              raise SystemExit("No prior selected videos found")

          for path in files[:limit]:
              shutil.copy2(path, target / path.name)
              print(f"Prepared {path.name} ({path.stat().st_size} bytes)")
          print(f"Prepared {min(limit, len(files))} prior selected video(s) for KC packaging")
          PY

      - name: Package prior selected videos as KC
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.selected_artifact_run_id != '' && github.event.inputs.kc_artifact_run_id == '' }}
        run: |
          extra_args=()
          if [[ "${{ github.event.inputs.force_fallback }}" == "true" || -z "${DEEPSEEK_API_KEY}" ]]; then
            extra_args+=(--force-fallback)
          fi

          python auto_kc_entertain.py \
            --input-dir work/douyin_free_daily/latest/selected_limited \
            --metadata-file work/douyin_free_daily/latest/reports/selected.json \
            --output-dir "$KC_OUTPUT_DIR" \
            --work-dir work/auto_kc_douyin_free \
            --encoder libx264 \
            --threads 2 \
            "${extra_args[@]}"

      - name: Download KC videos from prior run
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.kc_artifact_run_id != '' }}
        uses: actions/download-artifact@v5
        with:
          name: kc-entertain-videos
          run-id: ${{ github.event.inputs.kc_artifact_run_id }}
          github-token: ${{ github.token }}
          path: work/prior_kc_artifact

      - name: Stage prior KC videos by date
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.kc_artifact_run_id != '' }}
        run: |
          mkdir -p "$KC_OUTPUT_DIR" work/auto_kc_douyin_free
          outputs_file="work/auto_kc_douyin_free/last_run_outputs.txt"
          : > "$outputs_file"
          while IFS= read -r file; do
            target="$KC_OUTPUT_DIR/$(basename "$file")"
            cp "$file" "$target"
            echo "$(pwd)/$target" >> "$outputs_file"
          done < <(find work/prior_kc_artifact -type f -name '*.mp4' ! -path '*/oversized-originals/*' | sort)
          count="$(find "$KC_OUTPUT_DIR" -maxdepth 1 -type f -name '*.mp4' | wc -l)"
          echo "Staged $count KC video(s) into $KC_OUTPUT_DIR"

      - name: Publish oversized KC originals and prepare Git-safe copies
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.search_only != 'true') }}
        continue-on-error: true
        run: |
          python tools/publish_kc_videos.py \
            --output-dir "$KC_OUTPUT_DIR" \
            --output-date "$KC_OUTPUT_DATE" \
            --git-max-bytes "$KC_GIT_MAX_BYTES" \
            --compression-target-bytes 94371840 \
            --backup-dir "work/kc_oversized_originals/${KC_OUTPUT_DATE}" \
            --compression-work-dir work/kc_publish_tmp \
            --summary-file work/kc_publish_summary.json \
            --webdav-base-url "https://dav.jianguoyun.com/dav/" \
            --webdav-root "KCdesk/Ops" \
            --webdav-category "KC娱乐"

      - name: Commit KC videos to main
        if: ${{ success() && (github.event_name != 'workflow_dispatch' || github.event.inputs.search_only != 'true') }}
        continue-on-error: true
        run: |
          shopt -s nullglob
          videos=("$KC_OUTPUT_DIR"/*.mp4)
          if [[ "${#videos[@]}" -eq 0 ]]; then
            echo "No KC videos to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          safe_count=0
          skipped_count=0
          for video in "${videos[@]}"; do
            size="$(stat -c '%s' "$video")"
            if (( size < KC_GIT_MAX_BYTES )); then
              git add -f -- "$video"
              safe_count=$((safe_count + 1))
              echo "Staged for main: $video ($size bytes)"
            else
              skipped_count=$((skipped_count + 1))
              echo "::warning::Skipped oversized Git file: $video ($size bytes)"
            fi
          done
          echo "Git staging summary: $safe_count ready, $skipped_count skipped"
          if [[ -f outputs/kc_entertain/processed_aweme_ids.json ]]; then
            git add -f outputs/kc_entertain/processed_aweme_ids.json
          fi
          if git diff --cached --quiet; then
            echo "No new KC videos to commit"
            exit 0
          fi
          git commit -m "Add KC entertainment videos ${KC_OUTPUT_DATE}"
          if ! git pull --rebase origin "${GITHUB_REF_NAME}"; then
            git rebase --abort || true
            echo "::warning::Could not rebase the KC commit; videos remain available in Artifact and Jianguoyun."
            exit 0
          fi
          if ! git push origin "HEAD:${GITHUB_REF_NAME}"; then
            echo "::warning::Could not push the KC commit; videos remain available in Artifact and Jianguoyun."
            exit 0
          fi

      - name: Prepare KC artifact payload
        if: always()
        run: |
          rm -rf work/kc_artifact
          mkdir -p "work/kc_artifact/${KC_OUTPUT_DATE}"
          outputs_file="work/auto_kc_douyin_free/last_run_outputs.txt"
          if [[ ! -f "$outputs_file" ]]; then
            echo "No KC output list found"
            exit 0
          fi
          while IFS= read -r file; do
            if [[ -f "$file" ]]; then
              cp "$file" "work/kc_artifact/${KC_OUTPUT_DATE}/"
            fi
          done < "$outputs_file"
          originals_dir="work/kc_oversized_originals/${KC_OUTPUT_DATE}"
          if [[ -d "$originals_dir" ]]; then
            mkdir -p "work/kc_artifact/${KC_OUTPUT_DATE}/oversized-originals"
            cp "$originals_dir"/*.mp4 "work/kc_artifact/${KC_OUTPUT_DATE}/oversized-originals/" 2>/dev/null || true
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: douyin-free-daily-reports
          path: |
            work/douyin_free_daily/latest/reports
            work/douyin_free_daily/latest/kc_daily_summary.*
            work/auto_kc_douyin_free/last_run_summary.md
            work/auto_kc_douyin_free/last_run_outputs.txt
            work/kc_publish_summary.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload selected videos
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: douyin-free-selected-videos
          path: work/douyin_free_daily/latest/selected
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload KC videos
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: kc-entertain-videos
          path: work/kc_artifact
          if-no-files-found: ignore
          retention-days: 14
